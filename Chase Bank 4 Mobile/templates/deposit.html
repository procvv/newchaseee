{% extends "base.html" %}

{% block title %}Deposit | Chase Secure{% endblock %}
{% block page_title %}Deposit{% endblock %}

{% block content %}
    <section class="card">
        <form method="POST">
            <label class="sr-only" for="amount">Deposit amount</label>
            <input id="amount" type="number" step="0.01" name="amount" placeholder="$0.00" required>
            <button class="button" type="submit">Submit</button>
        </form>
    </section>

    <a href="/" class="text-link">Back</a>
{% endblock %}

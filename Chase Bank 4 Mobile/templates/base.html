<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <meta name="theme-color" content="#f3f7fc" id="themeColorMeta">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="{{ app_name }}">
    <meta name="description" content="A fictional finance demo app that can be installed to your home screen.">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container app-shell">
        <header class="app-topbar">
            <div>
                <p class="eyebrow">{{ app_name }}</p>
                <h1 class="page-title">{% block page_title %}{% endblock %}</h1>
                {% block page_subtitle %}{% endblock %}
            </div>
            <div class="brand-mark" aria-hidden="true">C</div>
        </header>

        <section class="demo-banner">
            <p>Demo app. Use sample details only.</p>
        </section>

        <section class="install-banner is-hidden" id="installBanner" aria-live="polite">
            <div>
                <p class="install-title">Install this app</p>
                <p class="install-copy" id="installHelp">Save Chase Secure to your home screen for a full-screen mobile launch.</p>
            </div>
            <button class="install-button" type="button" id="installButton">Install</button>
        </section>

        {% block content %}{% endblock %}

        <nav class="bottom-nav" aria-label="Primary">
            <a href="/" class="bottom-nav-link {% if active_page == 'accounts' %}active{% endif %}">
                <span class="bottom-nav-icon">A</span>
                <span>Accounts</span>
            </a>
            <a href="/card" class="bottom-nav-link {% if active_page == 'card' %}active{% endif %}">
                <span class="bottom-nav-icon">C</span>
                <span>Card</span>
            </a>
            <a href="/transactions" class="bottom-nav-link {% if active_page == 'transactions' %}active{% endif %}">
                <span class="bottom-nav-icon">T</span>
                <span>Transactions</span>
            </a>
        </nav>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
